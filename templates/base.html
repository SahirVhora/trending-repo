<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GitHub Trending{% endblock %}</title>
    <script>
    (function() {
        var stored = localStorage.getItem('theme');
        if (stored === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
    </script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #1c2128;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --success: #3fb950;
            --danger: #f85149;
            --warning: #d29922;
        }
        [data-theme="light"] {
            --bg: #ffffff;
            --surface: #f6f8fa;
            --surface-hover: #eaeef2;
            --border: #d0d7de;
            --text: #1f2328;
            --text-muted: #656d76;
            --accent: #0969da;
            --accent-hover: #0550ae;
            --success: #1a7f37;
            --danger: #cf222e;
            --warning: #9a6700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        nav .brand svg { width: 24px; height: 24px; fill: var(--accent); }
        nav .links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }
        nav .links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.25rem 0;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        nav .links a:hover, nav .links a.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        .theme-toggle {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            font-size: 1rem;
            line-height: 1;
            transition: color 0.2s, border-color 0.2s;
        }
        .theme-toggle:hover {
            color: var(--text);
            border-color: var(--accent);
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: var(--text);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        tr:hover td { background: var(--surface-hover); }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--surface-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .diff-entered { color: var(--success); }
        .diff-left { color: var(--danger); }
        .diff-stayed { color: var(--warning); }
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }
        .chart-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
        }
        .chart-wrapper {
            position: relative;
            height: 280px;
        }
        @media (max-width: 768px) {
            nav .nav-inner { flex-direction: column; height: auto; padding: 0.5rem 0; }
            nav .links { gap: 1rem; }
            main { padding: 1rem; }
            th, td { padding: 0.5rem; font-size: 0.85rem; }
            .card { padding: 1rem; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="brand">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Trending
            </a>
            <ul class="links">
                <li><a href="/" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
                <li><a href="/trend" {% if request.endpoint == 'trend' %}class="active"{% endif %}>Trend</a></li>
                <li><a href="/history" {% if request.endpoint == 'history' %}class="active"{% endif %}>History</a></li>
                <li><a href="/reports" {% if request.endpoint == 'reports' %}class="active"{% endif %}>Reports</a></li>
            </ul>
            <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle between light and dark theme">🌙</button>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
    (function() {
        var html = document.documentElement;
        var btn = document.getElementById('themeToggle');
        function apply(theme) {
            if (theme === 'light') { html.setAttribute('data-theme', 'light'); btn.textContent = '☀️'; }
            else { html.removeAttribute('data-theme'); btn.textContent = '🌙'; }
        }
        apply(localStorage.getItem('theme') || 'dark');
        if (btn) btn.addEventListener('click', function() {
            var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', next);
            apply(next);
            window.location.reload();
        });
    })();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
